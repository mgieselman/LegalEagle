name: Build and Deploy Extractor to Azure

on:
  push:
    branches: [main]
    paths:
      - 'extractor/**'
      - '.github/workflows/deploy-extractor.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ".[ocr-azure,dev]"
        working-directory: extractor
      - run: pytest
        working-directory: extractor

  build-and-deploy:
    needs: test           # Deploy is gated on tests — no green, no ship.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrlegaleagle

      - name: Build and push image
        run: |
          IMAGE=acrlegaleagle.azurecr.io/ca-extractor:${{ github.sha }}
          docker build -t $IMAGE ./extractor
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Update Container App
        run: |
          az containerapp update \
            --resource-group rg-legaleagle \
            --name ca-extractor \
            --image $IMAGE
