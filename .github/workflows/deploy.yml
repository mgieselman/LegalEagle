name: Build and Deploy to Azure

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ---- Client ----
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint client
        working-directory: ./client
        run: npm run lint

      - name: Type-check client
        working-directory: ./client
        run: npx tsc --noEmit

      - name: Run client tests
        working-directory: ./client
        continue-on-error: true  # TODO: Fix 110 failing tests then remove this
        run: npm test

      - name: Build client
        working-directory: ./client
        env:
          VITE_PLAUSIBLE_DOMAIN: app-legaleagle.azurewebsites.net
        run: npm run build

      # ---- Server ----
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Lint server
        working-directory: ./server
        run: npm run lint

      - name: Build server
        working-directory: ./server
        run: npm run build

      - name: Run server tests
        working-directory: ./server
        continue-on-error: true  # TODO: Fix 11 failing tests then remove this
        run: npm test

      # ---- Deploy ----
      - name: Prepare deployment package
        run: |
          mkdir -p deploy/client/dist
          mkdir -p deploy/server/dist
          cp -r client/dist/* deploy/client/dist/
          cp -r server/dist/* deploy/server/dist/
          cp server/package.json deploy/server/
          cp server/package-lock.json deploy/server/
          cd deploy/server && npm ci --omit=dev
          cd ../..

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-legaleagle
          package: ./deploy

      - name: Wipe and reseed database (no real data yet)
        run: |
          az webapp ssh --resource-group rg-legaleagle --name app-legaleagle --timeout 30 <<'SSHEOF' || true
          rm -f /home/site/wwwroot/server/data/legaleagle.db*
          SSHEOF
          az webapp restart --resource-group rg-legaleagle --name app-legaleagle
