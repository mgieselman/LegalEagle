name: Build and Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client
        working-directory: ./client
        run: npm run build

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Build server
        working-directory: ./server
        run: npm run build

      - name: Run server tests
        working-directory: ./server
        run: npm test

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/client/dist
          mkdir -p deploy/server/dist
          cp -r client/dist/* deploy/client/dist/
          cp -r server/dist/* deploy/server/dist/
          cp server/package.json deploy/server/
          cp server/package-lock.json deploy/server/
          cd deploy/server && npm ci --omit=dev
          cd ../..

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-legaleagle
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
